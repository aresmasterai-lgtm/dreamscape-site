<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - Dreamscape</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080B14;
      color: #E8EAF0;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    .icon {
      font-size: 80px;
      margin-bottom: 30px;
      animation: fadeIn 0.6s ease;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      font-weight: 900;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #7C5CFC, #00D4AA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeIn 0.8s ease;
    }
    p {
      font-size: 18px;
      color: #6B7494;
      margin-bottom: 40px;
      line-height: 1.7;
      animation: fadeIn 1s ease;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #7C5CFC, #5B3FDB);
      color: #fff;
      padding: 16px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: transform 0.2s;
      animation: fadeIn 1.2s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✨</div>
    <h1>Thank You!</h1>
    <p>We've received your submission and will get back to you soon. In the meantime, feel free to explore more of Dreamscape.</p>
    <a href="/" class="btn">← Back to Home</a>
  </div>
</body>
</html>
